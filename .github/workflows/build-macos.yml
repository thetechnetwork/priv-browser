name: Build Priv Browser - macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, macos, chromium-build]

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4
        with:
          repository: TheTechNetwork/priv-browser

      - name: Install Dependencies
        run: |
          brew install ninja cmake python3 git clang llvm

      - name: Setup Depot Tools
        run: |
          if [ ! -d "$HOME/priv_browser_build/depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/priv_browser_build/depot_tools"
          else
            cd "$HOME/priv_browser_build/depot_tools"
            git pull
          fi
          echo "PATH=$PATH:$HOME/priv_browser_build/depot_tools" >> $GITHUB_ENV

      - name: Configure `.gclient`
        run: |
          mkdir -p "$HOME/priv_browser_build"
          cat > "$HOME/priv_browser_build/priv-browser/.gclient" <<EOL
          solutions = [
            {
              "name": "src",
              "url": "https://github.com/TheTechNetwork/priv-browser.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["mac"]
          EOL

      - name: Sync Priv Browser Dependencies
        run: |
          cd "$HOME/priv_browser_build/priv-browser"
          gclient sync --nohooks --with_branch_heads --with_tags

      - name: Configure Priv Browser for macOS
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          gn gen out/mac --args='target_os="mac" target_cpu="x64" is_debug=false'

      - name: Build Priv Browser for macOS
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          autoninja -C out/mac chrome

      - name: Verify Output Files
        run: |
          echo "Checking output directory..."
          ls -lah "$HOME/priv_browser_build/priv-browser/src/out/mac"

      - name: Zip macOS Build Files
        run: |
          mkdir -p /tmp/priv-browser-mac
          zip -r /tmp/priv-browser-mac/priv-browser-mac.zip /home/user/priv_browser_build/priv-browser/src/out/mac

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-mac-build
          path: /tmp/priv-browser-mac/priv-browser-mac.zip
          if-no-files-found: error

      - name: Cleanup Zip File
        run: |
          rm -rf /tmp/priv-browser-mac
