name: Build Priv Browser - Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, chromium-build]

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4
        with:
          repository: TheTechNetwork/priv-browser
          #fetch-depth: 1
          #submodules: true

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang lld cmake python3 python3-pip git unzip wget openjdk-17-jdk ninja-build

      - name: Setup Depot Tools
        run: |
          if [ ! -d "$HOME/priv_browser_build/depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/priv_browser_build/depot_tools"
          else
            cd "$HOME/priv_browser_build/depot_tools"
            git pull
          fi
          echo "PATH=$PATH:$HOME/priv_browser_build/depot_tools" >> $GITHUB_ENV

      - name: Install Android SDK & NDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # Download and unzip Android Command Line Tools
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip" -O cmd-tools.zip
          unzip -q cmd-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          rm cmd-tools.zip
          
          # Move to expected location
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          
          # Accept licenses and install dependencies
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
          
          # Add environment variables
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_ENV

      - name: Configure `.gclient`
        run: |
          mkdir -p "$HOME/priv_browser_build"
          cat > "$HOME/priv_browser_build/priv-browser/.gclient" <<EOL
          solutions = [
            {
              "name": "src",
              "url": "https://github.com/TheTechNetwork/priv-browser.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["android"]
          EOL

      - name: Sync Priv Browser Dependencies
        run: |
          cd "$HOME/priv_browser_build/priv-browser"
          gclient sync --nohooks --with_branch_heads --with_tags

      - name: Configure Priv Browser for Android
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          gn gen out/Android --args='
            target_os="android"
            target_cpu="arm64"
            is_debug=false
            enable_resource_allowlist_generation=false
          '

      - name: Build Priv Browser APK
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          autoninja -C out/Android chrome_public_apk

      - name: Verify Output Files
        run: |
          echo "Checking output directory..."
          ls -lah "$HOME/priv_browser_build/priv-browser/src/out/Android/apks"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-android-apk
          path: |
            $HOME/priv_browser_build/priv-browser/src/out/Android/apks/ChromePublic.apk
            $HOME/priv_browser_build/priv-browser/src/out/Android/apks/ChromePublic.apk.mapping
            $HOME/priv_browser_build/priv-browser/src/out/Android/apks/ChromePublic.apk.R.txt
