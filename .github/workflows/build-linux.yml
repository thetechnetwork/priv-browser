name: Build Priv Browser - Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, chromium-build]

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4
        with:
          repository: TheTechNetwork/priv-browser

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang lld cmake python3 python3-pip git unzip wget ninja-build

      - name: Setup Depot Tools
        run: |
          if [ ! -d "$HOME/priv_browser_build/depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/priv_browser_build/depot_tools"
          else
            cd "$HOME/priv_browser_build/depot_tools"
            git pull
          fi
          echo "PATH=$PATH:$HOME/priv_browser_build/depot_tools" >> $GITHUB_ENV

      - name: Configure `.gclient`
        run: |
          mkdir -p "$HOME/priv_browser_build"
          cat > "$HOME/priv_browser_build/priv-browser/.gclient" <<EOL
          solutions = [
            {
              "name": "src",
              "url": "https://github.com/TheTechNetwork/priv-browser.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["linux"]
          EOL

      - name: Sync Priv Browser Dependencies
        run: |
          cd "$HOME/priv_browser_build/priv-browser"
          gclient sync --nohooks --with_branch_heads --with_tags

      - name: Configure Priv Browser for Linux
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          gn gen out/Linux --args='target_os="linux" target_cpu="x64" is_debug=false'

      - name: Build Priv Browser for Linux
        run: |
          cd "$HOME/priv_browser_build/priv-browser/src"
          autoninja -C out/Linux chrome

      - name: Verify Output Files
        run: |
          echo "Checking output directory..."
          ls -lah "$HOME/priv_browser_build/priv-browser/src/out/Linux"

      - name: Zip Linux Build Files
        run: |
          mkdir -p /tmp/priv-browser-linux
          zip -r /tmp/priv-browser-linux/priv-browser-linux.zip /home/user/priv_browser_build/priv-browser/src/out/Linux

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-linux-build
          path: /tmp/priv-browser-linux/priv-browser-linux.zip
          if-no-files-found: error

      - name: Cleanup Zip File
        run: |
          rm -rf /tmp/priv-browser-linux
