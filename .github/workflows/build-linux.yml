name: Build Chromium - Linux

on:
  #push:
  #  branches:
  #    - main
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Chromium Fork
        uses: actions/checkout@v4
        with:
          repository: TheTechNetwork/priv-browser
          submodules: recursive

      - name: Set up caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            src/out/Default
          key: linux-chromium-${{ github.run_id }}
          restore-keys: |
            linux-chromium-

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang lld ninja-build python3 python3-pip

      - name: Fetch Depot Tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Sync Chromium Source
        run: |
          fetch --nohooks chromium
          cd src
          gclient sync --nohooks --with_branch_heads --with_tags

      - name: Run GN Config
        run: |
          cd src
          gn gen out/Default --args='is_debug=false is_component_build=false symbol_level=0 use_ccache=true'

      - name: Build Chromium
        run: |
          cd src
          autoninja -C out/Default chrome

      - name: Run Tests
        run: |
          cd src
          autoninja -C out/Default base_unittests
          ./out/Default/base_unittests --gtest_output=xml:test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: src/out/Default/test-results.xml

      - name: Upload Build Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: src/out/Default/chrome
          tag_name: latest
          token: ${{ secrets.GITHUB_TOKEN }}
