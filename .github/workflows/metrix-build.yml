name: Build Chromium

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      fork_branch:
        description: 'Branch to build (defaults to main)'
        required: false
        default: 'main'

jobs:
  build:
    name: Build Chromium
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [self-hosted-linux, self-hosted-windows, self-hosted-macos]
      fail-fast: false

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v3
        with:
          path: bootstrap
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Python (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python --version
          pip --version

      - name: Verify Python (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python --version
          pip --version

      - name: Enable Windows long paths + Git config
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          git config --system core.longpaths true

      - name: Install Linux dependencies
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip pkg-config libssl-dev ninja-build \
            ccache libglib2.0-dev libpango1.0-dev libdbus-1-dev libatk1.0-dev libatk-bridge2.0-dev \
            libcups2-dev libxkbcommon-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libgbm-dev libasound2-dev libpulse-dev libnss3-dev libxss-dev libgtk-3-dev \
            libx11-xcb-dev

      - name: Install macOS dependencies
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          brew install ninja ccache

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          where ninja || choco install ninja -y
          where ccache || choco install ccache -y

      - name: Install depot_tools (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist depot_tools git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          pushd depot_tools
          git checkout -B main origin/main
          git fetch --prune --all
          git pull origin main
          popd
          echo PATH=%cd%\depot_tools;%PATH%>> %GITHUB_ENV%

      - name: Install depot_tools (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          # Clean up any existing depot_tools
          if [ -d "depot_tools" ]; then
            rm -rf depot_tools
          fi
          
          # Fresh clone
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          
          # Set executable permissions
          chmod +x depot_tools/gclient
          chmod +x depot_tools/gclient.py
          
          # Set PATH for this step
          export PATH="$(pwd)/depot_tools:$PATH"
          
          # Set PATH for future steps
          echo "PATH=$(pwd)/depot_tools:$PATH" >> $GITHUB_ENV
          
          # Verify installation
          echo "Current directory: $(pwd)"
          ls -la depot_tools
          echo "PATH: $PATH"
          which gclient || depot_tools/gclient --version

      - name: Install depot_tools (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          # Clean up any existing depot_tools
          if [ -d "depot_tools" ]; then
            rm -rf depot_tools
          fi
          
          # Fresh clone
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          
          # Set executable permissions
          chmod +x depot_tools/gclient
          chmod +x depot_tools/gclient.py
          
          # Set PATH for this step
          export PATH="$(pwd)/depot_tools:$PATH"
          
          # Set PATH for future steps
          echo "PATH=$(pwd)/depot_tools:$PATH" >> $GITHUB_ENV
          
          # Verify installation
          echo "Current directory: $(pwd)"
          ls -la depot_tools
          echo "PATH: $PATH"
          which gclient || depot_tools/gclient --version

      - name: Setup ccache (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 50G" > ~/.ccache/ccache.conf
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CC=ccache cc" >> $GITHUB_ENV
          echo "CXX=ccache c++" >> $GITHUB_ENV

      - name: Setup ccache (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 50G" > ~/.ccache/ccache.conf
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CC=ccache cc" >> $GITHUB_ENV
          echo "CXX=ccache c++" >> $GITHUB_ENV

      - name: Set fork details (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          FORK_URL="https://github.com/TheTechNetwork/priv-browser.git"
          FORK_BRANCH="${{ github.event.inputs.fork_branch || 'main' }}"
          echo "FORK_URL=$FORK_URL" >> $GITHUB_ENV
          echo "FORK_BRANCH=$FORK_BRANCH" >> $GITHUB_ENV

      - name: Set fork details (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          FORK_URL="https://github.com/TheTechNetwork/priv-browser.git"
          FORK_BRANCH="${{ github.event.inputs.fork_branch || 'main' }}"
          echo "FORK_URL=$FORK_URL" >> $GITHUB_ENV
          echo "FORK_BRANCH=$FORK_BRANCH" >> $GITHUB_ENV

      - name: Set fork details (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo FORK_URL=https://github.com/TheTechNetwork/priv-browser.git>> %GITHUB_ENV%
          if defined github_event_inputs_fork_branch (
            echo FORK_BRANCH=%github_event_inputs_fork_branch%>> %GITHUB_ENV%
          ) else (
            echo FORK_BRANCH=main>> %GITHUB_ENV%
          )

      - name: Check Windows SDK
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          dir "C:\Program Files (x86)\Windows Kits\10\include" || echo SDK directory not found

      - name: Fetch Chromium source (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo solutions = [ > .gclient
          echo   { >> .gclient
          echo     "name": "src", >> .gclient
          echo     "url": "%FORK_URL%", >> .gclient
          echo     "deps_file": "DEPS", >> .gclient
          echo     "managed": False, >> .gclient
          echo     "custom_deps": {}, >> .gclient
          echo     "custom_vars": {}, >> .gclient
          echo   }, >> .gclient
          echo ] >> .gclient

          if exist src\.git (
            cd src
            git remote set-url origin %FORK_URL%
            git fetch --prune
            git checkout %FORK_BRANCH%
            git pull
            cd ..
          ) else (
            git clone %FORK_URL% src
            cd src && git checkout %FORK_BRANCH% && cd ..
          )

          gclient sync --no-history --with_branch_heads --with_tags -D
          gclient runhooks

      - name: Fetch Chromium source (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          cat > .gclient << EOF
          solutions = [
            {
              "name": "src",
              "url": "$FORK_URL",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          EOF
          if [ -d src/.git ]; then
            cd src
            git remote set-url origin "$FORK_URL"
            git fetch --prune
            git checkout "$FORK_BRANCH"
            git pull
            cd ..
          else
            git clone "$FORK_URL" src
            cd src && git checkout "$FORK_BRANCH" && cd ..
          fi
          
          # Debug info
          echo "Current directory: $(pwd)"
          echo "PATH: $PATH"
          which gclient
          
          gclient sync --no-history --with_branch_heads --with_tags -D
          gclient runhooks

      - name: Fetch Chromium source (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          cat > .gclient << EOF
          solutions = [
            {
              "name": "src",
              "url": "$FORK_URL",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          EOF
          if [ -d src/.git ]; then
            cd src
            git remote set-url origin "$FORK_URL"
            git fetch --prune
            git checkout "$FORK_BRANCH"
            git pull
            cd ..
          else
            git clone "$FORK_URL" src
            cd src && git checkout "$FORK_BRANCH" && cd ..
          fi
          
          # Debug info
          echo "Current directory: $(pwd)"
          echo "PATH: $PATH"
          which gclient
          
          gclient sync --no-history --with_branch_heads --with_tags -D
          gclient runhooks

      - name: Configure Chromium build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          INCLUDE: ""
        run: |
          cd src
          if not exist out\Release mkdir out\Release
          gn gen out\Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0 windows_sdk_version=\"10.0.22621.0\""

      - name: Configure Chromium build (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          cd src
          mkdir -p out/Release
          gn gen out/Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0"

      - name: Configure Chromium build (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          cd src
          mkdir -p out/Release
          gn gen out/Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0"

      - name: Build Chromium (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd src
          ninja -C out\Release chrome

      - name: Build Chromium (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          cd src
          ninja -C out/Release chrome

      - name: Build Chromium (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          cd src
          ninja -C out/Release chrome

      - name: Package Chromium build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist artifacts mkdir artifacts
          cd src\out\Release
          powershell -Command "Compress-Archive -Path chrome.exe, *.pak, *.bin, locales, resources, MEIPreload, swiftshader, icudtl.dat, *.dll -DestinationPath ..\..\..\..\artifacts\chromium-${{ matrix.runner }}.zip -Force"

      - name: Package Chromium build (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          mkdir -p artifacts
          cd src/out/Release
          tar -czf ../../../../artifacts/chromium-${{ matrix.runner }}.tar.gz chrome *.pak *.bin locales resources MEIPreload swiftshader icudtl.dat *.so || true

      - name: Package Chromium build (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          mkdir -p artifacts
          cd src/out/Release
          tar -czf ../../../../artifacts/chromium-${{ matrix.runner }}.tar.gz chrome *.pak *.bin locales resources MEIPreload swiftshader icudtl.dat *.so || true

      - name: Store artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set ARTIFACT_DIR=%GITHUB_WORKSPACE%\build-artifacts\${{ matrix.runner }}
          mkdir %ARTIFACT_DIR%
          xcopy /E /I /Y artifacts\* %ARTIFACT_DIR%\
          echo Build date: %DATE% %TIME%> %ARTIFACT_DIR%\build-info.txt
          echo Branch: %FORK_BRANCH%>> %ARTIFACT_DIR%\build-info.txt
          cd src
          for /f %%i in ('git rev-parse HEAD') do set COMMIT=%%i
          cd ..
          echo Commit: %COMMIT%>> %ARTIFACT_DIR%\build-info.txt
          echo Runner: ${{ matrix.runner }}>> %ARTIFACT_DIR%\build-info.txt

      - name: Store artifacts (Linux)
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          mkdir -p $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}
          cp -r artifacts/* $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/ || true
          echo "Build date: $(date)" > $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Branch: $FORK_BRANCH" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Commit: $(cd src && git rev-parse HEAD)" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Runner: ${{ matrix.runner }}" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt

      - name: Store artifacts (macOS)
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          mkdir -p $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}
          cp -r artifacts/* $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/ || true
          echo "Build date: $(date)" > $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Branch: $FORK_BRANCH" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Commit: $(cd src && git rev-parse HEAD)" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt
          echo "Runner: ${{ matrix.runner }}" >> $GITHUB_WORKSPACE/build-artifacts/${{ matrix.runner }}/build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ matrix.runner }}
          path: ${{ github.workspace }}/build-artifacts/${{ matrix.runner }}
