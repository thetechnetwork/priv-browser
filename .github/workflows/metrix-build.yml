name: Build Priv-Browser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      fork_branch:
        description: 'Branch to build (defaults to main)'
        required: false
        default: 'main'
      clean_build:
        description: 'Force clean build and reset cached builds'
        type: boolean
        required: false
        default: false
      full_reset:
        description: 'Complete reset (delete and re-clone everything)'
        type: boolean
        required: false
        default: false
      parallel_jobs:
        description: 'Number of parallel build jobs (default: auto)'
        required: false
        default: 'auto'

jobs:
  build:
    name: Build Chromium
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 480  # 8 hour timeout
    strategy:
      matrix:
        runner: [self-hosted-linux, self-hosted-windows, self-hosted-macos]
      fail-fast: false

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v3
        with:
          path: bootstrap
          fetch-depth: 1

      - name: Set build parameters
        id: build_params
        shell: bash
        run: |
          # Set parallel jobs based on input or system capabilities
          if [[ "${{ github.event.inputs.parallel_jobs }}" == "auto" ]]; then
            if [[ "${{ runner.os }}" == "Linux" ]]; then
              CORES=$(nproc)
              JOBS=$(( CORES / 2 ))  # Use half of available cores
            elif [[ "${{ runner.os }}" == "macOS" ]]; then
              CORES=$(sysctl -n hw.ncpu)
              JOBS=$(( CORES / 2 ))  # Use half of available cores
            elif [[ "${{ runner.os }}" == "Windows" ]]; then
              CORES=$NUMBER_OF_PROCESSORS
              JOBS=$(( CORES / 2 ))  # Use half of available cores
            else
              JOBS=4  # Default fallback
            fi
          else
            JOBS="${{ github.event.inputs.parallel_jobs }}"
          fi
          
          # Make sure it's at least 1
          if [[ $JOBS -lt 1 ]]; then
            JOBS=1
          fi
          
          echo "PARALLEL_JOBS=$JOBS" >> $GITHUB_ENV
          echo "parallel_jobs=$JOBS" >> $GITHUB_OUTPUT
          echo "Will use $JOBS parallel build jobs"

      - name: Full reset check
        if: github.event.inputs.full_reset == 'true'
        shell: bash
        run: |
          echo "🧨 FULL RESET requested - removing all source code and cached builds"
          rm -rf depot_tools src .gclient .gclient_entries "$GITHUB_WORKSPACE/cached-builds"/*
          echo "✅ Reset complete - will perform fresh clone and build"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Python (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python --version
          pip --version

      - name: Verify Python (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python --version
          pip --version

      - name: Enable Windows long paths + Git config
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          git config --system core.longpaths true

      - name: Install Linux dependencies
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip pkg-config libssl-dev ninja-build \
            ccache libglib2.0-dev libpango1.0-dev libdbus-1-dev libatk1.0-dev libatk-bridge2.0-dev \
            libcups2-dev libxkbcommon-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libgbm-dev libasound2-dev libpulse-dev libnss3-dev libxss-dev libgtk-3-dev \
            libx11-xcb-dev

      - name: Install macOS dependencies
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          brew install ninja ccache

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          where ninja || choco install ninja -y
          where ccache || choco install ccache -y

      - name: Install depot_tools
        shell: bash
        run: |
          if [ -d "depot_tools" ]; then
            # Remove existing depot_tools and create fresh clone
            rm -rf depot_tools
          fi
          # Fresh clone
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          chmod +x depot_tools/gclient depot_tools/gclient.py
          echo "PATH=$(pwd)/depot_tools:$PATH" >> $GITHUB_ENV

      - name: Setup ccache (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 50G" > ~/.ccache/ccache.conf
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CC=ccache cc" >> $GITHUB_ENV
          echo "CXX=ccache c++" >> $GITHUB_ENV

      - name: Set fork details
        shell: bash
        run: |
          echo "FORK_URL=https://github.com/TheTechNetwork/priv-browser.git" >> $GITHUB_ENV
          echo "FORK_BRANCH=${{ github.event.inputs.fork_branch || 'main' }}" >> $GITHUB_ENV

      - name: Prepare cache directories 
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/cached-builds"
          # Clear cached builds if clean_build is requested
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Cleaning all cached builds as requested"
            rm -rf "$GITHUB_WORKSPACE/cached-builds"/*
            rm -rf src/out
            mkdir -p "$GITHUB_WORKSPACE/cached-builds"
          fi

      - name: Fetch Chromium source
        shell: bash
        run: |
          cat > .gclient << EOF
          solutions = [
            {
              "name": "src",
              "url": "$FORK_URL",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          EOF
          
          if [ -d src/.git ]; then
            echo "Updating existing checkout..."
            cd src
            # Reset any changes or stash them to allow clean operations
            git reset --hard HEAD
            git clean -fd
            git remote set-url origin "$FORK_URL" 
            git fetch --prune
            git checkout -f "$FORK_BRANCH"
            git reset --hard origin/"$FORK_BRANCH"
            cd ..
          else
            echo "Performing fresh clone..."
            git clone "$FORK_URL" src && cd src && git checkout "$FORK_BRANCH" && cd ..
          fi
          
          echo "Running gclient sync..."
          gclient sync --no-history --with_branch_heads --with_tags -D
          
          echo "Running gclient runhooks..."
          gclient runhooks

      - name: Checkout patch repo
        shell: bash
        run: |
          echo "Cloning patch repository..."
          rm -rf priv-browser-patches
          git clone --depth=1 https://${{ secrets.PRIV_BROWSER_PAT }}@github.com/TheTechNetwork/priv-browser-patches.git priv-browser-patches
          echo "✅ Patch repository cloned successfully"
          ls -la priv-browser-patches

      - name: Apply custom patches
        shell: bash
        run: |
          echo "Applying patches from priv-browser-patches..."
          cd src
          for patch in ../priv-browser-patches/*.patch; do
            echo "Checking and applying $patch"
            if git apply --reverse --check "$patch" > /dev/null 2>&1; then
              echo "Patch already applied, skipping: $patch"
              continue
            fi
            if git apply "$patch"; then
              echo "✅ Applied: $patch"
            else
              echo "❌ Failed to apply: $patch"
              exit 1
            fi
          done

      - name: Verify patch application
        shell: bash
        run: |
          cd src
          echo "Checking for whitespace errors..."
          git diff --check || { echo "❌ Whitespace issues"; exit 1; }
          echo "Checking for rejected hunks..."
          if find . -name "*.rej" | grep -q .; then
            echo "❌ Found .rej files"
            find . -name "*.rej"
            exit 1
          fi
          echo "✅ Patch verification passed"

      - name: Generate build cache key
        id: build_key
        shell: bash
        run: |
          cd src
          CHROMIUM_COMMIT=$(git rev-parse HEAD)
          PATCH_HASH=$(find ../priv-browser-patches -type f -name "*.patch" -exec sha1sum {} \; | sort | sha1sum | awk '{print $1}')
          CACHE_KEY="build-${CHROMIUM_COMMIT}-${PATCH_HASH}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "CACHE_DIR=$GITHUB_WORKSPACE/cached-builds/$CACHE_KEY" >> $GITHUB_ENV
          mkdir -p "$GITHUB_WORKSPACE/cached-builds/$CACHE_KEY"

      - name: Check for existing build
        id: check_build
        shell: bash
        run: |
          echo "Checking cache in $CACHE_DIR for ${{ runner.os }}"
          
          if [[ "${{ github.event.inputs.clean_build }}" == "true" || "${{ github.event.inputs.full_reset }}" == "true" ]]; then
            echo "🧹 Skipping cache check as clean build or full reset was requested"
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CHROME_PATH="$CACHE_DIR/chrome.exe"
          else
            CHROME_PATH="$CACHE_DIR/chrome"
          fi
          
          if [[ -f "$CHROME_PATH" && -f "$CACHE_DIR/icudtl.dat" ]]; then
            echo "cache-hit=true" >> $GITHUB_OUTPUT
            echo "✅ Found cached build"
          else
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            echo "❌ No cached build found"
          fi

      - name: Reuse cached build
        if: steps.check_build.outputs.cache-hit == 'true'
        shell: bash
        run: |
          echo "Reusing cached build"
          mkdir -p src/out/Release
          cp -r "$CACHE_DIR/"* src/out/Release/

      - name: Configure Chromium build
        if: steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          rm -rf out/Release || true
          mkdir -p out/Release
          
          # Common GN args
          GN_ARGS="is_debug=false use_sysroot=false is_component_build=false symbol_level=0 treat_warnings_as_errors=false"
          
          # Additional optimization flags to reduce build time and memory usage
          GN_ARGS="$GN_ARGS v8_enable_slow_dchecks=false v8_optimized_debug=false"
          
          # Different GN args for different platforms
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            gn gen out/Release --args="$GN_ARGS is_clang=true"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows requires clang, see https://crbug.com/988071
            gn gen out/Release --args="$GN_ARGS is_clang=true"
          else
            gn gen out/Release --args="$GN_ARGS"
          fi
          
          echo "Build configured with args: $GN_ARGS"

      - name: Build Chromium (Linux)
        if: contains(matrix.runner, 'linux') && steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          echo "Starting Chromium build with controlled parallelism..."
          echo "Using $PARALLEL_JOBS parallel jobs"
          echo "Available CPU cores: $(nproc)"
          echo "Available memory: $(free -h)"
          echo "Disk space: $(df -h .)"
          
          # First attempt with progress monitoring
          ATTEMPT=1
          MAX_ATTEMPTS=3
          BUILD_SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$BUILD_SUCCESS" = "false" ]; do
            echo "Build attempt $ATTEMPT of $MAX_ATTEMPTS"
            
            # Start the build with timeout
            timeout 90m ninja -C out/Release chrome -j$PARALLEL_JOBS
            
            if [ $? -eq 0 ]; then
              BUILD_SUCCESS=true
              echo "✅ Build completed successfully on attempt $ATTEMPT"
            elif [ $? -eq 124 ]; then
              echo "⚠️ Build timed out after 90 minutes on attempt $ATTEMPT"
              echo "Cleaning up stuck processes..."
              killall -9 clang++ || true
              sleep 10
              
              # Reduce parallelism for next attempt
              PARALLEL_JOBS=$(( PARALLEL_JOBS / 2 ))
              if [ $PARALLEL_JOBS -lt 1 ]; then PARALLEL_JOBS=1; fi
              echo "Reduced parallelism to $PARALLEL_JOBS for next attempt"
            else
              echo "❌ Build failed with error code $? on attempt $ATTEMPT"
              echo "Build output directory contents:"
              find out/Release -type f -name "chrome" -o -name "*.so" | sort
            fi
            
            ATTEMPT=$(( ATTEMPT + 1 ))
          done
          
          if [ "$BUILD_SUCCESS" = "true" ]; then
            echo "Final build successful!"
            ls -la out/Release/chrome
          else
            echo "Failed to build after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Build Chromium (macOS)
        if: contains(matrix.runner, 'macos') && steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          echo "Starting Chromium build with controlled parallelism..."
          echo "Using $PARALLEL_JOBS parallel jobs"
          echo "Available CPU cores: $(sysctl -n hw.ncpu)"
          echo "Available memory: $(vm_stat | grep 'Pages free')"
          echo "Disk space: $(df -h .)"
          
          # First attempt with progress monitoring
          ATTEMPT=1
          MAX_ATTEMPTS=3
          BUILD_SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$BUILD_SUCCESS" = "false" ]; do
            echo "Build attempt $ATTEMPT of $MAX_ATTEMPTS"
            
            # Start the build without timeout (macOS doesn't have timeout command)
            ninja -C out/Release chrome -j$PARALLEL_JOBS
            BUILD_RESULT=$?
            
            if [ $BUILD_RESULT -eq 0 ]; then
              BUILD_SUCCESS=true
              echo "✅ Build completed successfully on attempt $ATTEMPT"
            else
              echo "❌ Build failed with error code $BUILD_RESULT on attempt $ATTEMPT"
              echo "Cleaning up stuck processes..."
              killall -9 clang++ || true
              sleep 10
              
              # Reduce parallelism for next attempt
              PARALLEL_JOBS=$(( PARALLEL_JOBS / 2 ))
              if [ $PARALLEL_JOBS -lt 1 ]; then PARALLEL_JOBS=1; fi
              echo "Reduced parallelism to $PARALLEL_JOBS for next attempt"
              
              echo "Build output directory contents:"
              find out/Release -type f -name "chrome" | sort
            fi
            
            ATTEMPT=$(( ATTEMPT + 1 ))
          done
          
          if [ "$BUILD_SUCCESS" = "true" ]; then
            echo "Final build successful!"
            ls -la out/Release/chrome
          else
            echo "Failed to build after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Build Chromium (Windows)
        if: runner.os == 'Windows' && steps.check_build.outputs.cache-hit == 'false'
        shell: cmd
        run: |
          echo Current PATH is %PATH%
          cd src
          
          echo Starting build with %PARALLEL_JOBS% jobs...
          
          REM First build attempt
          C:\ProgramData\chocolatey\bin\ninja.exe -C out\Release chrome -j%PARALLEL_JOBS%
          
          if %ERRORLEVEL% EQU 0 (
            echo Build succeeded!
          ) else (
            echo First build attempt failed with error code %ERRORLEVEL%
            echo Killing any stuck processes and trying again...
            taskkill /F /IM clang.exe /T
            taskkill /F /IM clang++.exe /T
            timeout /t 10
            
            REM Try again with reduced parallelism
            set /a REDUCED_JOBS=%PARALLEL_JOBS%/2
            if %REDUCED_JOBS% LSS 1 set REDUCED_JOBS=1
            echo Retrying with %REDUCED_JOBS% jobs...
            C:\ProgramData\chocolatey\bin\ninja.exe -C out\Release chrome -j%REDUCED_JOBS%
          )
          
          echo Build complete, checking for chrome.exe...
          dir out\Release\chrome.exe

      - name: Cache completed build
        if: steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          # Ensure the cache directory exists
          mkdir -p "$CACHE_DIR"
          
          echo "Caching build output to $CACHE_DIR"
          
          # Copy build artifacts to cache
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp -r src/out/Release/* "$CACHE_DIR/"
          else
            cp -r src/out/Release/* "$CACHE_DIR/"
          fi
          
          echo "Build cached successfully"
          ls -la "$CACHE_DIR"

      - name: Package Chromium build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cd src/out/Release
          echo "Packaging build artifacts..."
          echo "Files in build directory:"
          ls -la
          
          echo "Creating archive..."
          tar -czf "$GITHUB_WORKSPACE/artifacts/chromium-${{ matrix.runner }}.tar.gz" \
            chrome *.pak *.bin locales resources MEIPreload swiftshader icudtl.dat *.so || \
            echo "Some files not found, but continuing"
          
          echo "✅ Package created at $GITHUB_WORKSPACE/artifacts/chromium-${{ matrix.runner }}.tar.gz"
          ls -la "$GITHUB_WORKSPACE/artifacts"

      - name: Package Chromium build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir %GITHUB_WORKSPACE%\artifacts 2>nul
          cd src\out\Release
          
          echo Checking for chrome.exe...
          dir chrome.exe
          
          echo Creating package directory...
          mkdir temp_pkg 2>nul
          
          echo Copying main executable...
          copy chrome.exe temp_pkg\ || echo chrome.exe not found
          
          echo Copying PAK files...
          for %%f in (*.pak) do copy %%f temp_pkg\ || echo No pak files found
          
          echo Copying BIN files...
          for %%f in (*.bin) do copy %%f temp_pkg\ || echo No bin files found
          
          echo Copying DLL files...
          for %%f in (*.dll) do copy %%f temp_pkg\ || echo No dll files found
          
          echo Copying icudtl.dat...
          copy icudtl.dat temp_pkg\ || echo icudtl.dat not found
          
          echo Copying folders...
          if exist locales xcopy /E /I /Y locales temp_pkg\locales || echo locales folder not found
          if exist resources xcopy /E /I /Y resources temp_pkg\resources || echo resources folder not found
          if exist MEIPreload xcopy /E /I /Y MEIPreload temp_pkg\MEIPreload || echo MEIPreload folder not found
          if exist swiftshader xcopy /E /I /Y swiftshader temp_pkg\swiftshader || echo swiftshader folder not found
          
          echo Listing files in temp_pkg directory...
          dir /s temp_pkg
          
          echo Creating zip archive...
          cd temp_pkg
          tar -a -cf %GITHUB_WORKSPACE%\artifacts\chromium-%RUNNER_OS%.zip *
          cd ..
          rmdir /S /Q temp_pkg
          
          echo Archive created:
          dir %GITHUB_WORKSPACE%\artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ matrix.runner }}
          path: "${{ github.workspace }}/artifacts"
          if-no-files-found: warn
