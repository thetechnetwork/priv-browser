- name: Full reset check
        if: github.event.inputs.full_reset == 'true'
        shell: bash
        run: |
          echo "🧨 FULL RESET requested - removing all source code and cached builds"
          rm -rf depot_tools src .gclient .gclient_entries "$GITHUB_WORKSPACE/cached-builds"/*
          echo "✅ Reset complete - will perform fresh clone and build"name: Build Priv-Browser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      fork_branch:
        description: 'Branch to build (defaults to main)'
        required: false
        default: 'main'
      clean_build:
        description: 'Force clean build and reset cached builds'
        type: boolean
        required: false
        default: false
      full_reset:
        description: 'Complete reset (delete and re-clone everything)'
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: Build Chromium
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [self-hosted-linux, self-hosted-windows, self-hosted-macos]
      fail-fast: false

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v3
        with:
          path: bootstrap
          fetch-depth: 1

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Python (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python --version
          pip --version

      - name: Verify Python (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python --version
          pip --version

      - name: Enable Windows long paths + Git config
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          git config --system core.longpaths true

      - name: Install Linux dependencies
        if: contains(matrix.runner, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip pkg-config libssl-dev ninja-build \
            ccache libglib2.0-dev libpango1.0-dev libdbus-1-dev libatk1.0-dev libatk-bridge2.0-dev \
            libcups2-dev libxkbcommon-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libgbm-dev libasound2-dev libpulse-dev libnss3-dev libxss-dev libgtk-3-dev \
            libx11-xcb-dev

      - name: Install macOS dependencies
        if: contains(matrix.runner, 'macos')
        shell: bash
        run: |
          brew install ninja ccache

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          where ninja || choco install ninja -y
          where ccache || choco install ccache -y

      - name: Install depot_tools
        shell: bash
        run: |
          if [ -d "depot_tools" ]; then
            # Remove existing depot_tools and create fresh clone
            rm -rf depot_tools
          fi
          # Fresh clone
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          chmod +x depot_tools/gclient depot_tools/gclient.py
          echo "PATH=$(pwd)/depot_tools:$PATH" >> $GITHUB_ENV

      - name: Setup ccache (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 50G" > ~/.ccache/ccache.conf
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CC=ccache cc" >> $GITHUB_ENV
          echo "CXX=ccache c++" >> $GITHUB_ENV

      - name: Set fork details
        shell: bash
        run: |
          echo "FORK_URL=https://github.com/TheTechNetwork/priv-browser.git" >> $GITHUB_ENV
          echo "FORK_BRANCH=${{ github.event.inputs.fork_branch || 'main' }}" >> $GITHUB_ENV

      - name: Prepare cache directories 
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/cached-builds"
          # Clear cached builds if clean_build is requested
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Cleaning all cached builds as requested"
            rm -rf "$GITHUB_WORKSPACE/cached-builds"/*
            rm -rf src/out
            mkdir -p "$GITHUB_WORKSPACE/cached-builds"
          fi

      - name: Fetch Chromium source
        shell: bash
        run: |
          cat > .gclient << EOF
          solutions = [
            {
              "name": "src",
              "url": "$FORK_URL",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          EOF
          if [ -d src/.git ]; then
            cd src
            # Reset any changes or stash them to allow clean operations
            git reset --hard HEAD
            git clean -fd
            git remote set-url origin "$FORK_URL" 
            git fetch --prune
            git checkout -f "$FORK_BRANCH"
            git reset --hard origin/"$FORK_BRANCH"
            cd ..
          else
            git clone "$FORK_URL" src && cd src && git checkout "$FORK_BRANCH" && cd ..
          fi
          gclient sync --no-history --with_branch_heads --with_tags -D
          gclient runhooks
          
          # Handle existing checkout for incremental builds
          if [ -d src/.git ]; then
            cd src
            # Save any local changes
            git stash -u || true
            # Update remote URL in case it changed
            git remote set-url origin "$FORK_URL"
            # Fetch latest changes
            git fetch --prune
            # Hard reset to target branch to avoid merge conflicts
            git reset --hard origin/"$FORK_BRANCH"
            cd ..
          else
            # Fresh clone if src doesn't exist
            git clone "$FORK_URL" src
            cd src
            git checkout "$FORK_BRANCH"
            cd ..
          fi
          
          # Sync dependencies
          gclient sync --no-history --with_branch_heads --with_tags -D
          gclient runhooks

      - name: Checkout patch repo
        uses: actions/checkout@v3
        with:
          repository: TheTechNetwork/priv-browser-patches
          token: ${{ secrets.PRIV_BROWSER_PAT }}
          path: priv-browser-patches

      - name: Apply custom patches
        shell: bash
        run: |
          echo "Applying patches from priv-browser-patches..."
          cd src
          for patch in ../priv-browser-patches/*.patch; do
            echo "Checking and applying $patch"
            if git apply --reverse --check "$patch" > /dev/null 2>&1; then
              echo "Patch already applied, skipping: $patch"
              continue
            fi
            if git apply "$patch"; then
              echo "✅ Applied: $patch"
            else
              echo "❌ Failed to apply: $patch"
              exit 1
            fi
          done

      - name: Verify patch application
        shell: bash
        run: |
          cd src
          echo "Checking for whitespace errors..."
          git diff --check || { echo "❌ Whitespace issues"; exit 1; }
          echo "Checking for rejected hunks..."
          if find . -name "*.rej" | grep -q .; then
            echo "❌ Found .rej files"
            find . -name "*.rej"
            exit 1
          fi
          echo "✅ Patch verification passed"

      - name: Generate build cache key
        id: build_key
        shell: bash
        run: |
          cd src
          CHROMIUM_COMMIT=$(git rev-parse HEAD)
          PATCH_HASH=$(find ../priv-browser-patches -type f -name "*.patch" -exec sha1sum {} \; | sort | sha1sum | awk '{print $1}')
          CACHE_KEY="build-${CHROMIUM_COMMIT}-${PATCH_HASH}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "CACHE_DIR=$GITHUB_WORKSPACE/cached-builds/$CACHE_KEY" >> $GITHUB_ENV
          mkdir -p "$GITHUB_WORKSPACE/cached-builds/$CACHE_KEY"

      - name: Check for existing build
        id: check_build
        shell: bash
        run: |
          echo "Checking cache in $CACHE_DIR for ${{ runner.os }}"
          
          if [[ "${{ github.event.inputs.clean_build }}" == "true" || "${{ github.event.inputs.full_reset }}" == "true" ]]; then
            echo "🧹 Skipping cache check as clean build or full reset was requested"
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CHROME_PATH="$CACHE_DIR/chrome.exe"
          else
            CHROME_PATH="$CACHE_DIR/chrome"
          fi
          
          if [[ -f "$CHROME_PATH" && -f "$CACHE_DIR/icudtl.dat" ]]; then
            echo "cache-hit=true" >> $GITHUB_OUTPUT
            echo "✅ Found cached build"
          else
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            echo "❌ No cached build found"
          fi

      - name: Reuse cached build
        if: steps.check_build.outputs.cache-hit == 'true'
        shell: bash
        run: |
          echo "Reusing cached build"
          mkdir -p src/out/Release
          cp -r "$CACHE_DIR/"* src/out/Release/

      - name: Configure Chromium build
        if: steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          rm -rf out/Release || true
          mkdir -p out/Release
          # Different GN args for different platforms
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            gn gen out/Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0 treat_warnings_as_errors=false is_clang=true"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            gn gen out/Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0 treat_warnings_as_errors=false is_clang=false"
          else
            gn gen out/Release --args="is_debug=false use_sysroot=false is_component_build=false symbol_level=0 treat_warnings_as_errors=false"
          fi

      - name: Build Chromium (Linux)
        if: contains(matrix.runner, 'linux') && steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          ninja -C out/Release chrome -j$(nproc)

      - name: Build Chromium (macOS)
        if: contains(matrix.runner, 'macos') && steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          cd src
          ninja -C out/Release chrome

      - name: Build Chromium (Windows)
        if: runner.os == 'Windows' && steps.check_build.outputs.cache-hit == 'false'
        shell: cmd
        run: |
          cd src
          ninja -C out\Release chrome

      - name: Cache completed build
        if: steps.check_build.outputs.cache-hit == 'false'
        shell: bash
        run: |
          # Ensure the cache directory exists
          mkdir -p "$CACHE_DIR"
          
          # Copy build artifacts to cache
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp -r src/out/Release/* "$CACHE_DIR/"
          else
            cp -r src/out/Release/* "$CACHE_DIR/"
          fi

      - name: Package Chromium build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cd src/out/Release
          tar -czf "../../../../artifacts/chromium-${{ matrix.runner }}.tar.gz" \
            chrome *.pak *.bin locales resources MEIPreload swiftshader icudtl.dat *.so || true

      - name: Package Chromium build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir artifacts
          cd src\out\Release
          mkdir temp_pkg
          copy chrome.exe temp_pkg\ || echo chrome.exe not found
          copy *.pak temp_pkg\ || echo No pak files found
          copy *.bin temp_pkg\ || echo No bin files found
          xcopy /E /I /Y locales temp_pkg\locales || echo locales folder not found
          xcopy /E /I /Y resources temp_pkg\resources || echo resources folder not found
          xcopy /E /I /Y MEIPreload temp_pkg\MEIPreload || echo MEIPreload folder not found
          xcopy /E /I /Y swiftshader temp_pkg\swiftshader || echo swiftshader folder not found
          copy icudtl.dat temp_pkg\ || echo icudtl.dat not found
          copy *.dll temp_pkg\ || echo No dll files found
          
          cd temp_pkg
          tar -a -cf ..\..\..\..\artifacts\chromium-${{ matrix.runner }}.zip *
          cd ..
          rmdir /S /Q temp_pkg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chromium-${{ matrix.runner }}
          path: artifacts
