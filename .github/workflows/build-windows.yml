name: Build Priv Browser - Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, chromium-build]

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4
        with:
          repository: TheTechNetwork/priv-browser
          #fetch-depth: 1
          #submodules: true

      - name: Setup Depot Tools
        run: |
          git config --global core.autocrlf false
          git config --global core.filemode false
          git config --global core.fscache true
          git config --global core.preloadindex true
          git config --global depot-tools.allowGlobalGitConfig false
          if (-Not (Test-Path "C:\priv_browser_build\depot_tools")) {
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\priv_browser_build\depot_tools
          } else {
            cd C:\priv_browser_build\depot_tools
            git fetch origin
            git reset --hard origin/main
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\priv_browser_build\depot_tools"

      - name: Configure `.gclient`
        run: |
          New-Item -ItemType Directory -Path "C:\priv_browser_build\priv-browser" -Force
          @"
          solutions = [
            {
              "name": "src",
              "url": "https://github.com/TheTechNetwork/priv-browser.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["win"]
          "@ | Set-Content -Path "C:\priv_browser_build\priv-browser\.gclient"

      - name: Sync Priv Browser Dependencies
        shell: cmd
        run: |
          cd C:\priv_browser_build\priv-browser
          gclient sync --nohooks --with_branch_heads --with_tags

      - name: Configure Priv Browser for Windows
        shell: cmd
        run: |
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          cd C:\priv_browser_build\priv-browser\src
          gclient runhooks
          gn gen out\Windows --args="target_os=\"win\" target_cpu=\"x64\" is_debug=false"

      - name: Build Priv Browser (Windows)
        shell: cmd
        run: |
          cd C:\priv_browser_build\priv-browser\src
          ninja -C out\Windows chrome

      - name: Verify Output Files
        shell: cmd
        run: |
          echo "Checking output directory..."
          dir C:\priv_browser_build\priv-browser\src\out\Windows
          echo "File info for chrome.exe:"
          file C:\priv_browser_build\priv-browser\src\out\Windows\chrome.exe || echo "chrome.exe not found"

      - name: Fix Permissions (If Needed)
        shell: cmd
        run: |
          icacls C:\priv_browser_build\priv-browser\src\out\Windows\chrome.exe /grant Everyone:F /T

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-windows-build
          path: |
            C:\priv_browser_build\priv-browser\src\out\Windows\chrome.exe
            C:\priv_browser_build\priv-browser\src\out\Windows\*
