name: Build Priv Browser for Windows & Linux

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: [self-hosted, linux, chromium-build]  # Ensure correct runner

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build clang lld cmake python3 python3-pip git mingw-w64 unzip wget

      - name: Setup Depot Tools
        run: |
          if [ ! -d "/home/user/priv_browser_build/depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /home/user/priv_browser_build/depot_tools
          else
            cd /home/user/priv_browser_build/depot_tools
            git pull
          fi
          echo "PATH=$PATH:/home/user/priv_browser_build/depot_tools" >> $GITHUB_ENV

      - name: Ensure `.gclient` is Correctly Configured
        run: |
          cat > /home/user/priv_browser_build/priv-browser/.gclient <<EOL
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["linux", "win"]
          cache_dir = "/home/user/priv_browser_build/.gclient_cache"
          EOL

      - name: Run `gclient sync` to Fetch Dependencies
        run: |
          cd /home/user/priv_browser_build/priv-browser
          gclient sync --nohooks --shallow

      - name: Use Pre-Downloaded Windows Toolchain
        run: |
          TOOLCHAIN_DIR="/home/user/priv_browser_build/win_toolchain"
          mkdir -p "$TOOLCHAIN_DIR"
          
          # If toolchain is missing, download it from Google Drive
          if [ ! -d "$TOOLCHAIN_DIR/VC" ]; then
            echo "⬇️ Downloading Windows toolchain..."
            wget --no-check-certificate -O win_toolchain.zip "https://drive.usercontent.google.com/download?id=1Z6DcuUdsL0pNCmHSmKA6CxHZlbL-CN1V&export=download&confirm=t"
            unzip -o win_toolchain.zip -d "$TOOLCHAIN_DIR"
            rm win_toolchain.zip
          else
            echo "✅ Windows toolchain already exists, skipping download."
          fi

          # Force Chromium to use the local toolchain
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN_BASE_URL=$TOOLCHAIN_DIR" >> $GITHUB_ENV
          echo "GYP_MSVS_HASH_7393122652=e0b1a90051" >> $GITHUB_ENV

          # Verify toolchain extraction
          if [ ! -d "$TOOLCHAIN_DIR/VC" ]; then
            echo "❌ Error: Windows toolchain not found after extraction!"
            exit 1
          fi
          
          echo "✅ Windows toolchain is ready!"

      - name: Set Windows Build Environment Variables
        run: |
          TOOLCHAIN_DIR="/home/user/priv_browser_build/win_toolchain"
          SDK_PATH=$(find "$TOOLCHAIN_DIR" -type d -name "Windows Kits" | head -n 1)
          VS_PATH="$TOOLCHAIN_DIR/VC"
          SDK_VERSION=$(ls "$SDK_PATH/10/Include/" | sort -V | tail -n 1)

          # Set environment variables so Chromium finds the Windows toolchain
          echo "WINDOWSSDKDIR=$SDK_PATH/10" >> $GITHUB_ENV
          echo "GYP_MSVS_OVERRIDE_PATH=$VS_PATH" >> $GITHUB_ENV
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN_BASE_URL=$TOOLCHAIN_DIR" >> $GITHUB_ENV
          echo "GYP_MSVS_HASH_7393122652=e0b1a90051" >> $GITHUB_ENV

      - name: Configure Priv Browser for Windows
        run: |
          cd /home/user/priv_browser_build/priv-browser/src
          gn gen out/Windows --args="target_os=\"win\" target_cpu=\"x64\" is_debug=false"

      - name: Build Priv Browser for Windows
        run: |
          cd /home/user/priv_browser_build/priv-browser/src
          ninja -C out/Windows chrome -j$(nproc)

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-windows-build
          path: /home/user/priv_browser_build/priv-browser/src/out/Windows/chrome.exe

      - name: Configure Priv Browser for Linux
        run: |
          cd /home/user/priv_browser_build/priv-browser/src
          gn gen out/Linux --args="target_os=\"linux\" target_cpu=\"x64\" is_debug=false"

      - name: Build Priv Browser for Linux
        run: |
          cd /home/user/priv_browser_build/priv-browser/src
          ninja -C out/Linux chrome -j$(nproc)

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-linux-build
          path: /home/user/priv_browser_build/priv-browser/src/out/Linux/chrome
