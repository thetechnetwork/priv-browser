name: Build Priv Browser for Windows & Linux

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: [self-hosted, linux, chromium-build]  # Ensure correct runner

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4

      - name: Install or Update Depot Tools
        run: |
          cd ~
          if [ -d "depot_tools" ]; then
            echo "✅ depot_tools already exists. Updating..."
            cd depot_tools
            git pull origin main
          else
            echo "📥 Cloning depot_tools..."
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          echo 'export PATH="$HOME/depot_tools:$PATH"' >> ~/.bashrc
          source ~/.bashrc

      - name: Create .gclient Config
        run: |
          cd ~/priv_browser_build/priv-browser
          cat <<EOF > .gclient
          solutions = [
            {
              "name": "src",
              "url": "https://github.com/TheTechNetwork/priv-browser.git",
              "managed": False,
              "custom_deps": {},
            },
          ]
          EOF

      - name: Sync Dependencies Without Pulling Source
        run: |
          cd ~/priv_browser_build/priv-browser
          gclient sync --nohooks

      - name: Run gclient runhooks
        run: |
          cd ~/priv_browser_build/priv-browser/src
          gclient runhooks

      - name: Set Up Windows Toolchain
        run: |
          cd ~/priv_browser_build/priv-browser/src
          python3 build/vs_toolchain.py update --force  # ✅ FIX: Download Windows SDK & MSVC toolchain

      - name: Configure Priv Browser for Linux
        run: |
          cd ~/priv_browser_build/priv-browser/src
          gn gen out/Linux --args="target_os=\"linux\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Priv Browser for Linux
        run: |
          cd ~/priv_browser_build/priv-browser/src
          ninja -C out/Linux chrome -j$(nproc)

      - name: Configure Priv Browser for Windows
        run: |
          cd ~/priv_browser_build/priv-browser/src
          gn gen out/Windows --args="target_os=\"win\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Priv Browser for Windows
        run: |
          cd ~/priv_browser_build/priv-browser/src
          ninja -C out/Windows chrome -j$(nproc)

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-linux-build
          path: ~/priv_browser_build/priv-browser/src/out/Linux/chrome

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-windows-build
          path: ~/priv_browser_build/priv-browser/src/out/Windows/chrome.exe