name: Build Priv Browser for Windows & Linux

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: [self-hosted, linux, chromium-build]  # Ensure correct runner

    steps:
      - name: Checkout Priv Browser Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build clang lld cmake python3 python3-pip git mingw-w64

      - name: Clone Priv Browser Repository
        run: |
          mkdir -p ~/priv_browser_build
          cd ~/priv_browser_build
          
          if [ ! -d "priv-browser" ]; then
            git clone --depth=1 https://github.com/TheTechNetwork/priv-browser.git priv-browser
          else
            cd priv-browser
            git pull origin main
          fi

      - name: Ensure SSH Key Permissions
        run: |
          chmod 600 ~/.ssh/priv-browser-patches
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone Private Patches Repository
        run: |
          cd ~/priv_browser_build
          
          if [ ! -d "patches" ]; then
            GIT_SSH_COMMAND="ssh -i ~/.ssh/priv-browser-patches -p 443" git clone git@ssh.github.com:TheTechNetwork/priv-browser-patches.git patches
          else
            cd patches
            GIT_SSH_COMMAND="ssh -i ~/.ssh/priv-browser-patches -p 443" git pull origin main
          fi

      #- name: Apply Patches
      #  run: |
      #    cd ~/priv_browser_build/priv-browser
      #    for patch in ~/priv_browser_build/patches/*.patch; do git apply "$patch"; done

      - name: Configure Priv Browser for Linux
        run: |
          cd ~/priv_browser_build/priv-browser
          gn gen out/Linux --args="target_os=\"linux\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Priv Browser for Linux
        run: |
          cd ~/priv_browser_build/priv-browser
          ninja -C out/Linux chrome -j$(nproc)

      - name: Configure Priv Browser for Windows
        run: |
          cd ~/priv_browser_build/priv-browser
          gn gen out/Windows --args="target_os=\"win\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Priv Browser for Windows
        run: |
          cd ~/priv_browser_build/priv-browser
          ninja -C out/Windows chrome -j$(nproc)

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-linux-build
          path: ~/priv_browser_build/priv-browser/out/Linux/chrome

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: priv-browser-windows-build
          path: ~/priv_browser_build/priv-browser/out/Windows/chrome.exe
