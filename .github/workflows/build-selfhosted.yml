name: Build Chromium for Windows & Linux Using Selfhosted Runners

on:
  #push:
  #  branches:
  #    - main
  workflow_dispatch:
    
jobs:
  build:
    runs-on: [self-hosted, linux]  # Ensures it runs on a self-hosted Linux runner
    steps:
      - name: Checkout Chromium Repo
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build clang lld cmake python3 python3-pip git mingw-w64

      - name: Clone and Patch Chromium
        run: |
          mkdir -p ~/chromium_build
          cd ~/chromium_build
          
          if [ ! -d "chromium" ]; then
            git clone --depth=1 https://github.com/thetechnetwork/priv-browser.git chromium
          else
            cd chromium
            git pull origin main
          fi

          if [ ! -d "patches" ]; then
            git clone https://github.com/thetechnetwork/privbrowser-patches.git patches
          else
            cd patches
            git pull origin main
          fi

          cd ~/chromium_build/chromium
          for patch in ~/chromium_build/patches/*.patch; do git apply "$patch"; done

      - name: Configure Chromium for Linux
        run: |
          cd ~/chromium_build/chromium
          gn gen out/Linux --args="target_os=\"linux\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Chromium for Linux
        run: |
          cd ~/chromium_build/chromium
          ninja -C out/Linux chrome -j$(nproc)

      - name: Configure Chromium for Windows
        run: |
          cd ~/chromium_build/chromium
          gn gen out/Windows --args="target_os=\"win\" target_cpu=\"x64\" is_debug=false is_component_build=false enable_nacl=false"

      - name: Build Chromium for Windows
        run: |
          cd ~/chromium_build/chromium
          ninja -C out/Windows chrome -j$(nproc)

      - name: Upload Linux Build
        uses: actions/upload-artifact@v3
        with:
          name: chromium-linux-build
          path: ~/chromium_build/chromium/out/Linux/chrome

      - name: Upload Windows Build
        uses: actions/upload-artifact@v3
        with:
          name: chromium-windows-build
          path: ~/chromium_build/chromium/out/Windows/chrome.exe
